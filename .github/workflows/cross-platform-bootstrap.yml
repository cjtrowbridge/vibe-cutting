name: Cross-Platform Bootstrap

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_heavyweight_helpers:
        description: "Run heavyweight helper smoke tests such as FreeCAD Gears"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  linux:
    name: Bootstrap Linux x86-64
    runs-on: ubuntu-latest
    env:
      VIBE_CUTTING_TOOLS_ROOT: ${{ github.workspace }}/.tools
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore checksum-validated tool caches
        uses: actions/cache@v4
        with:
          path: |
            .tools/cache
            .tools/pixi-home
            .tools/environments
          key: bootstrap-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('setup/pixi.lock', 'setup/checksums/*.sha256', 'setup/tools/*requirements.lock', 'third_party/freecad-gears/pixi.lock') }}
          restore-keys: |
            bootstrap-${{ runner.os }}-${{ runner.arch }}-

      - name: Doctor before setup
        run: setup/bootstrap.sh doctor

      - name: Bootstrap locked base runtime
        run: setup/bootstrap.sh --allow-downloads setup

      - name: Verify bootstrap state
        run: setup/bootstrap.sh verify

      - name: Prove managed script execution
        run: setup/bootstrap.sh run -- scripts/laser_build.py --help

      - name: Validate helper manifests
        run: setup/bootstrap.sh run -- scripts/helper_tool.py validate

      - name: Generate host-readiness report
        run: setup/bootstrap.sh run -- scripts/host_readiness_report.py --output-root .tools/reports/host-readiness

      - name: Print latest bootstrap report path
        run: setup/bootstrap.sh report

      - name: Optional heavyweight helper smoke tests
        if: ${{ github.event.inputs.run_heavyweight_helpers == 'true' }}
        continue-on-error: true
        run: |
          setup/bootstrap.sh run -- scripts/helper_tool.py setup freecad_gears
          setup/bootstrap.sh run -- scripts/helper_tool.py check freecad_gears
          setup/bootstrap.sh run -- setup/tools/freecad_gears.py smoke --manifest tool_adapters/freecad_gears.json

      - name: Upload host-readiness evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: host-readiness-${{ runner.os }}-${{ runner.arch }}
          path: .tools/reports/host-readiness
          if-no-files-found: warn

  windows:
    name: Bootstrap Windows x86-64
    runs-on: windows-latest
    env:
      VIBE_CUTTING_TOOLS_ROOT: ${{ github.workspace }}\.tools
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore checksum-validated tool caches
        uses: actions/cache@v4
        with:
          path: |
            .tools\cache
            .tools\pixi-home
            .tools\environments
          key: bootstrap-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('setup/pixi.lock', 'setup/checksums/*.sha256', 'setup/tools/*requirements.lock', 'third_party/freecad-gears/pixi.lock') }}
          restore-keys: |
            bootstrap-${{ runner.os }}-${{ runner.arch }}-

      - name: Doctor before setup
        shell: pwsh
        run: .\setup\bootstrap.ps1 doctor

      - name: Bootstrap locked base runtime
        shell: pwsh
        run: .\setup\bootstrap.ps1 -AllowDownloads setup

      - name: Verify bootstrap state
        shell: pwsh
        run: .\setup\bootstrap.ps1 verify

      - name: Prove managed script execution
        shell: pwsh
        run: .\setup\bootstrap.ps1 run -- scripts/laser_build.py --help

      - name: Validate helper manifests
        shell: pwsh
        run: .\setup\bootstrap.ps1 run -- scripts/helper_tool.py validate

      - name: Generate host-readiness report
        shell: pwsh
        run: .\setup\bootstrap.ps1 run -- scripts/host_readiness_report.py --output-root .tools/reports/host-readiness

      - name: Print latest bootstrap report path
        shell: pwsh
        run: .\setup\bootstrap.ps1 report

      - name: Optional heavyweight helper smoke tests
        if: ${{ github.event.inputs.run_heavyweight_helpers == 'true' }}
        continue-on-error: true
        shell: pwsh
        run: |
          .\setup\bootstrap.ps1 run -- scripts/helper_tool.py setup freecad_gears
          .\setup\bootstrap.ps1 run -- scripts/helper_tool.py check freecad_gears
          .\setup\bootstrap.ps1 run -- setup/tools/freecad_gears.py smoke --manifest tool_adapters/freecad_gears.json

      - name: Upload host-readiness evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: host-readiness-${{ runner.os }}-${{ runner.arch }}
          path: .tools\reports\host-readiness
          if-no-files-found: warn

  macos:
    name: Bootstrap macOS
    runs-on: macos-latest
    env:
      VIBE_CUTTING_TOOLS_ROOT: ${{ github.workspace }}/.tools
    steps:
      - name: Check out repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore checksum-validated tool caches
        uses: actions/cache@v4
        with:
          path: |
            .tools/cache
            .tools/pixi-home
            .tools/environments
          key: bootstrap-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('setup/pixi.lock', 'setup/checksums/*.sha256', 'setup/tools/*requirements.lock', 'third_party/freecad-gears/pixi.lock') }}
          restore-keys: |
            bootstrap-${{ runner.os }}-${{ runner.arch }}-

      - name: Doctor before setup
        run: setup/bootstrap.sh doctor

      - name: Bootstrap locked base runtime
        run: setup/bootstrap.sh --allow-downloads setup

      - name: Verify bootstrap state
        run: setup/bootstrap.sh verify

      - name: Prove managed script execution
        run: setup/bootstrap.sh run -- scripts/laser_build.py --help

      - name: Validate helper manifests
        run: setup/bootstrap.sh run -- scripts/helper_tool.py validate

      - name: Generate host-readiness report
        run: setup/bootstrap.sh run -- scripts/host_readiness_report.py --output-root .tools/reports/host-readiness

      - name: Print latest bootstrap report path
        run: setup/bootstrap.sh report

      - name: Optional heavyweight helper smoke tests
        if: ${{ github.event.inputs.run_heavyweight_helpers == 'true' }}
        continue-on-error: true
        run: |
          setup/bootstrap.sh run -- scripts/helper_tool.py setup freecad_gears
          setup/bootstrap.sh run -- scripts/helper_tool.py check freecad_gears
          setup/bootstrap.sh run -- setup/tools/freecad_gears.py smoke --manifest tool_adapters/freecad_gears.json

      - name: Upload host-readiness evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: host-readiness-${{ runner.os }}-${{ runner.arch }}
          path: .tools/reports/host-readiness
          if-no-files-found: warn
